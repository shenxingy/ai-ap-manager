name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ap_db
          POSTGRES_USER: ap_user
          POSTGRES_PASSWORD: ap_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils
      - name: Install Python deps
        run: pip install -r backend/requirements.txt
      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://ap_user:ap_pass@localhost:5432/ap_db
          DATABASE_URL_SYNC: postgresql://ap_user:ap_pass@localhost:5432/ap_db
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          JWT_SECRET: ci-test-secret-not-for-production
          APPROVAL_TOKEN_SECRET: ci-test-secret-not-for-production
          LLM_PROVIDER: none
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: pytest -v

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff mypy
      - name: Ruff check
        working-directory: backend
        run: ruff check app
      - name: Mypy
        working-directory: backend
        run: mypy app --ignore-missing-imports

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8002
        run: npm run build
